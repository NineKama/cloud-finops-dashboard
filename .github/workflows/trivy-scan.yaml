name: 🛡️ Trivy Docker Image Scan

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "*"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔧 Build backend image
        run: docker build -t finops-backend ./backend

      - name: 🔧 Build frontend image
        run: docker build -t finops-frontend ./frontend

      - name: 🛡️ Scan backend image with Trivy
        uses: aquasecurity/trivy-action@latest
        with:
          image-ref: finops-backend
          format: table
          severity: CRITICAL,HIGH

      - name: 🛡️ Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@latest
        with:
          image-ref: finops-frontend
          format: table
          severity: CRITICAL,HIGH