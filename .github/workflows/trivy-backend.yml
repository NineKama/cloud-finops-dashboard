name: 🔍 Trivy Scan Backend Image

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/trivy-backend.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t finops-backend ./backend
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: finops-backend
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true