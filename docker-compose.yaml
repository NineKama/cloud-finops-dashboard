version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  